name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install CMake
      run: sudo apt-get install -y cmake
    - name: Configure with CMake
      run: cmake -B build
    - name: Build
      run: cmake --build build
    - name: Run tests
      run: cmake --build build --target test
